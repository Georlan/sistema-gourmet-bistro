version: "3.8"

services:
  # Python FastAPI core gateway
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - SUPABASE_DB_URL=${SUPABASE_DB_URL:?variável SUPABASE_DB_URL é obrigatória}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:?variável SUPABASE_SERVICE_ROLE_KEY é obrigatória}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:?variável CLOUDFLARE_API_TOKEN é obrigatória}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?variável TELEGRAM_BOT_TOKEN é obrigatória}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:?variável TELEGRAM_CHAT_ID é obrigatória}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      - redis
      - elasticsearch
    networks:
      - saas-network

  # Redis cache database cluster
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - saas-network

  # Central ELK: Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - saas-network

  # Central ELK: Logstash
  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.9
    volumes:
      - ./logstash/config/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - saas-network

  # Central ELK: Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.9
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge

volumes:
  redis-data:
  es-data:
